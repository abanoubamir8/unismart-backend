openapi: 3.0.0
info:
  title: UniSmart Backend API
  description: Official API for UniSmart Web Portal.
  version: 1.0.0

servers:
  - url: https://unismart-backend.vercel.app
    description: Vercel Production Server

paths:
  /api/login:
    post:
      summary: Student Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
                password:
                  type: string
                  example: "123"
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /api/courses/available:
    post:
      summary: Get Eligible Courses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
      responses:
        '200':
          description: List of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                    name:
                      type: string
                    credits:
                      type: integer
                    level:
                      type: integer

  /api/register-course:
    post:
      summary: Submit Course Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                requested_courses:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Registration successful
        '400':
          description: Validation error

  /api/timetable:
    post:
      summary: View Weekly Schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
      responses:
        '200':
          description: Timetable generated successfully
