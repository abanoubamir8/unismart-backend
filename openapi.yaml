openapi: 3.0.0
info:
  title: UniSmart Backend API
  description: Official API documentation for the Antigravity Graduation Project. Synced perfectly with the 2024 Tanta CS Mock Database.
  version: 1.0.0
servers:
  - url: https://unismart-backend-one.vercel.app
    description: Production Server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Courses
    description: Course registration and catalog endpoints
  - name: Student
    description: Student profile, grades, and dashboard endpoints

paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: Student login
      description: Authenticates a student using their university ID and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - password
              properties:
                university_id:
                  type: string
                password:
                  type: string
            examples:
              Freshman:
                summary: "Ahmed (The Freshman)"
                value:
                  university_id: "2026101"
                  password: "123"
              Junior:
                summary: "Abanoub (The Junior)"
                value:
                  university_id: "2026001"
                  password: "123"
              Senior:
                summary: "Sara (The Senior)"
                value:
                  university_id: "2026901"
                  password: "123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  student:
                    type: object
                    properties:
                      name:
                        type: string
                      gpa:
                        type: number
                      department:
                        type: string
                  token:
                    type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/courses/available:
    post:
      tags:
        - Courses
      summary: Get available courses for student
      description: Returns a list of courses the student can register for, including courses explicitly locked by unmet prerequisites based on Tanta Bylaws. Will not return courses already passed or currently registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
            examples:
              Freshman:
                summary: "Ahmed (The Freshman - Empty Slate)"
                value:
                  university_id: "2026101"
              Junior:
                summary: "Abanoub (The Junior - Complex Prerequisites)"
                value:
                  university_id: "2026001"
              MissingPrereq:
                summary: "Mona (Level 3 but missing CS212)"
                value:
                  university_id: "2026505"
      responses:
        '200':
          description: JSON list of available and locked courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '400':
          description: Bad Request
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Student not found
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/register-course:
    post:
      tags:
        - Courses
      summary: Register for courses
      description: Allows a student to register for an array of courses. Strictly enforces multi-tier prerequisites and level thresholds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - requested_courses
              properties:
                university_id:
                  type: string
                requested_courses:
                  type: array
                  items:
                    type: string
            examples:
              FreshmanSuccess:
                summary: "Freshman Registering (Success)"
                value:
                  university_id: "2026101"
                  requested_courses: ["CS111"]
              JuniorMissingPrereq:
                summary: "Junior Missing Prereq (Error 400)"
                value:
                  university_id: "2026001"
                  requested_courses: ["CS314"]
              SeniorAlreadyPassed:
                summary: "Senior Already Passed (Error 400)"
                value:
                  university_id: "2026901"
                  requested_courses: ["CS111"]
              ProbationAlreadyRegistered:
                summary: "Probation Double Register (Error 400)"
                value:
                  university_id: "2026404"
                  requested_courses: ["IS211"]
      responses:
        '200':
          description: Successfully registered courses. Returns updated array.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '400':
          description: Registration failed (missing prerequisite, already registered, etc)
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
               examples:
                 PrerequisiteMissing:
                   summary: "Prerequisite Missing Error"
                   value:
                     success: false
                     message: "Prerequisite missing: You must pass CS313 before registering for CS314."
                     errorCode: "PREREQUISITE_MISSING"
                 AlreadyRegistered:
                   summary: "Already Registered Error"
                   value:
                     success: false
                     message: "Already registered for course: IS211"
                 AlreadyPassed:
                   summary: "Already Passed Error"
                   value:
                     success: false
                     message: "Already passed course: CS111"
                 LevelRestricted:
                   summary: "Level Restricted Error"
                   value:
                     success: false
                     message: "This course is Level 2. You are currently Level 1."
        '404':
          description: Student or course not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/unregister-course:
    post:
      tags:
        - Courses
      summary: Unregister a course
      description: Removes a course from the student's currently registered courses list and permanently mutates state for the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - course_code
              properties:
                university_id:
                  type: string
                course_code:
                  type: string
            examples:
              JuniorUnregister:
                summary: "Abanoub safely dropping Advanced SE"
                value:
                  university_id: "2026001"
                  course_code: "SE311"
              SeniorUnregister:
                summary: "Sara safely dropping Graduation Project"
                value:
                  university_id: "2026901"
                  course_code: "PR412"
      responses:
        '200':
          description: Course unregistered successfully. Returns the exact state of active registrations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Course removed"
                  updated_registered_courses:
                    type: array
                    items:
                      type: string
                    example: ["CS313"]
        '400':
          description: Bad request
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Student not found or course not in list
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/profile:
    post:
      tags:
        - Student
      summary: Get student profile
      description: Retrieves standard profile information (name, email, GPA, year of study).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
            examples:
              Freshman:
                summary: "Ahmed (Year 1 Profile)"
                value:
                  university_id: "2026101"
              Senior:
                summary: "Sara (Year 4 Profile)"
                value:
                  university_id: "2026901"
      responses:
        '200':
          description: Student profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/dashboard:
    post:
      tags:
        - Student
      summary: Get dashboard statistics
      description: Retrieves aggregated data for the dashboard. Perfect for showing warning states.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
            examples:
              Junior:
                summary: "Abanoub (Healthy GPA Stats)"
                value:
                  university_id: "2026001"
              Probation:
                summary: "Kareem (Academic Warning & Restricted Hours)"
                value:
                  university_id: "2026404"
      responses:
        '200':
          description: Dashboard summary data
          content:
            application/json:
              schema:
                type: object
                properties:
                  gpa:
                    type: number
                  available_hours:
                    type: number
                  passed_hours:
                    type: number
                  registered_courses_count:
                    type: integer
                  registered_courses_details:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        course_name:
                          type: string
                        hours:
                          type: integer
                        professor:
                          type: string
                        action:
                          type: string
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/grades:
    post:
      tags:
        - Student
      summary: Get student academic history
      description: Retrieves the list of historically passed courses with their grades.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
            examples:
              Senior:
                summary: "Sara (Full Senior Transcript)"
                value:
                  university_id: "2026901"
              Freshman:
                summary: "Ahmed (Empty History)"
                value:
                  university_id: "2026101"
      responses:
        '200':
          description: Academic grades history array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeItem'
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/timetable:
    post:
      tags:
        - Student
      summary: Get student timetable
      description: Returns the weekly schedule for the student's registered courses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
            examples:
              Junior:
                summary: "Abanoub (Schedule Preview)"
                value:
                  university_id: "2026001"
      responses:
        '200':
          description: Timetable data array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    course_code:
                      type: string
                    course_name:
                      type: string
                    day:
                      type: string
                    time:
                      type: string
                    location:
                      type: string
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Course:
      type: object
      properties:
        code:
          type: string
          example: "CS314"
        name:
          type: string
          example: "Machine Learning"
        credits:
          type: integer
          example: 3
        level:
          type: integer
          example: 3
        prerequisites:
          type: array
          items:
            type: string
          example: ["CS313"]
        professor:
          type: string
          example: "Dr. Tarek"
        is_locked:
          type: boolean
          example: true
        lock_reason:
          type: string
          nullable: true
          example: "Prerequisite Missing: CS313"

    StudentProfile:
      type: object
      properties:
        name:
          type: string
          example: "Sara Senior"
        email:
          type: string
          example: "sara@university.edu"
        year_of_study:
          type: string
          example: "Fourth Year"
        department:
          type: string
          example: "Computer Science"
        student_id:
          type: string
          example: "2026901"
        gpa:
          type: number
          example: 3.9

    GradeItem:
      type: object
      properties:
        course_name:
          type: string
          example: "Object Oriented Programming"
        semester:
          type: string
          example: "First 2023"
        grade:
          type: number
          example: 97
        recognition:
          type: string
          example: "A+"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Detailed error message describing the failure."
        errorCode:
          type: string
          example: "PREREQUISITE_MISSING"
