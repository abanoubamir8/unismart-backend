openapi: 3.0.0
info:
  title: UniSmart Backend API
  description: Official API for UniSmart Web Portal (Antigravity Project).
  version: 1.0.0

servers:
  - url: https://unismart-backend-one.vercel.app
    description: Vercel Production Server

paths:
  # --- Existing Login ---
  /api/login:
    post:
      tags:
        - Auth
      summary: Student Authentication
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  # --- Existing Courses Available ---
  /api/courses/available:
    post:
      tags:
        - Courses
      summary: Get Eligible Courses
      operationId: getAvailableCourses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: List of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  # --- Existing Register Course ---
  /api/register-course:
    post:
      tags:
        - Courses
      summary: Submit Course Registration
      operationId: registerCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
                requested_courses:
                  type: array
                  items:
                    type: string
                  example: ["CS101", "MATH202"]
      responses:
        '200':
          description: Registration successful

  # --- NEW: Unregister/Drop Course ---
  /api/unregister-course:
    delete:
      tags:
        - Courses
      summary: Drop a registered course
      description: Deletes a course from student's record so it becomes available again.
      operationId: dropCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - course_code
              properties:
                university_id:
                  type: string
                  example: "2026001"
                course_code:
                  type: string
                  example: "CS311"
      responses:
        '200':
          description: Course dropped successfully
          content:
            application/json:
              example:
                message: "Course dropped successfully. It is now available for re-registration."
        '400':
          description: Missing required fields
        '404':
          description: Student or Course record not found

  # --- Existing Timetable ---
  /api/timetable:
    post:
      tags:
        - Student
      summary: View Weekly Schedule
      operationId: getTimetable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Timetable generated successfully

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - university_id
        - password
      properties:
        university_id:
          type: string
        password:
          type: string
    
    Course:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        credits:
          type: integer
        level:
          type: integer
