openapi: 3.0.0
info:
  title: UniSmart Backend API
  description: Official API for UniSmart Web Portal.
  version: 1.0.0

servers:
  - url: https://unismart-backend.vercel.app
    description: Vercel Production Server

paths:
  /api/login:
    post:
      summary: Student Authentication
      operationId: loginUser
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example:
                message: "Login successful"
                token: "eyJhbG..."
        '401':
          description: Invalid credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'

  /api/courses/available:
    post:
      summary: Get Eligible Courses
      operationId: getAvailableCourses
      responses:
        '200':
          description: List of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"

  /api/register-course:
    post:
      summary: Submit Course Registration
      operationId: registerCourse
      responses:
        '200':
          description: Registration successful
        '400':
          description: Validation error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
                requested_courses:
                  type: array
                  items:
                    type: string
                  example: ["CS101", "MATH202"]

  /api/timetable:
    post:
      summary: View Weekly Schedule
      operationId: getTimetable
      responses:
        '200':
          description: Timetable generated successfully
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - university_id
        - password
      properties:
        university_id:
          type: string
          example: "2026001"
        password:
          type: string
          example: "123"
    
    Course:
      type: object
      properties:
        code:
          type: string
          example: "CS101"
        name:
          type: string
          example: "Introduction to Computer Science"
        credits:
          type: integer
          example: 3
        level:
          type: integer
          example: 1
