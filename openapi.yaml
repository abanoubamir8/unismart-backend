```yaml
openapi: 3.0.0
info:
  title: UniSmart Backend API
  description: Official API documentation for the Antigravity Graduation Project
  version: 1.0.0
servers:
  - url: https://unismart-backend-one.vercel.app
    description: Production Server
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Courses
    description: Course registration and catalog endpoints
  - name: Student
    description: Student profile, grades, and dashboard endpoints
paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: Student login
      description: Authenticates a student using their university ID and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - password
              properties:
                university_id:
                  type: string
                  example: "2026001"
                password:
                  type: string
                  example: "123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  student:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "Abanoub Amir"
                      gpa:
                        type: number
                        example: 3.4
                      department:
                        type: string
                        example: "Computer Science"
                  token:
                    type: string
                    example: "fake-jwt-token"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/courses/available:
    post:
      tags:
        - Courses
      summary: Get available courses for student
      description: Returns a list of courses the student can register for, including those locked by unmet prerequisites.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: List of available and locked courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '400':
          description: Bad Request
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Student not found
          content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/register-course:
    post:
      tags:
        - Courses
      summary: Register for courses
      description: Allows a student to register for an array of courses. Enforces prerequisites and level limitations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - requested_courses
              properties:
                university_id:
                  type: string
                  example: "2026001"
                requested_courses:
                  type: array
                  items:
                    type: string
                  example: ["CS313", "CS314"]
      responses:
        '200':
          description: Successfully registered courses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["CS212", "CS313", "CS314"]
        '400':
          description: Registration failed (already passed, already registered, level restricted, or missing prerequisite)
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Student or course not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/unregister-course:
    delete:
      tags:
        - Courses
      summary: Unregister a course
      description: Removes a course from the student's currently registered courses list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
                - course_code
              properties:
                university_id:
                  type: string
                  example: "2026001"
                course_code:
                  type: string
                  example: "CS212"
      responses:
        '200':
          description: Course unregistered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Course unregistered successfully"
        '400':
          description: Bad request
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Student not found or course not in registration list
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/timetable:
    post:
      tags:
        - Student
      summary: Get student timetable
      description: Returns the weekly schedule for the student's registered courses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Timetable data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    course_code:
                      type: string
                      example: "CS212"
                    course_name:
                      type: string
                      example: "Data Structures"
                    day:
                      type: string
                      example: "Sunday"
                    time:
                      type: string
                      example: "10:00 AM - 12:00 PM"
                    location:
                      type: string
                      example: "Lab 1"
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/profile:
    post:
      tags:
        - Student
      summary: Get student profile
      description: Retrieves standard profile information (name, email, GPA, year of study).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Student profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/grades:
    post:
      tags:
        - Student
      summary: Get student academic history
      description: Retrieves the list of historically passed courses with their grades.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Academic grades history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeItem'
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

  /api/dashboard:
    post:
      tags:
        - Student
      summary: Get dashboard statistics
      description: Retrieves aggregated data for the dashboard (e.g., GPA, available hours, registered courses).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - university_id
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Dashboard summary data
          content:
            application/json:
              schema:
                type: object
                properties:
                  gpa:
                    type: number
                    example: 3.4
                  available_hours:
                    type: number
                    example: 21
                  passed_hours:
                    type: number
                    example: 65
                  registered_courses_count:
                    type: integer
                    example: 1
                  registered_courses_details:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "CS212"
                        course_name:
                          type: string
                          example: "Data Structures"
                        hours:
                          type: integer
                          example: 3
                        professor:
                          type: string
                          example: "Dr. Osama"
                        action:
                          type: string
                          example: "Delete"
        '404':
          description: Student not found
          content:
            application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Course:
      type: object
      properties:
        code:
          type: string
          example: "CS314"
        name:
          type: string
          example: "Machine Learning"
        credits:
          type: integer
          example: 3
        level:
          type: integer
          example: 3
        prerequisites:
          type: array
          items:
            type: string
          example: ["CS211"]
        professor:
          type: string
          example: "Dr. Tarek"
        is_locked:
          type: boolean
          example: true
        lock_reason:
          type: string
          nullable: true
          example: "Prerequisite Missing: CS211"

    StudentProfile:
      type: object
      properties:
        name:
          type: string
          example: "Abanoub Amir"
        email:
          type: string
          example: "abanoubamir@university.edu"
        year_of_study:
          type: string
          example: "Third Year"
        department:
          type: string
          example: "Computer Science"
        student_id:
          type: string
          example: "2026001"
        gpa:
          type: number
          example: 3.4

    GradeItem:
      type: object
      properties:
        course_name:
          type: string
          example: "Structured Programming"
        semester:
          type: string
          example: "Second 2024"
        grade:
          type: number
          example: 85
        recognition:
          type: string
          example: "B+"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Detailed error message describing the failure."
        errorCode:
          type: string
          example: "PREREQUISITE_MISSING"
```
