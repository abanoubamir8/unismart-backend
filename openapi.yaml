openapi: 3.0.0
info:
  title: Antigravity (UniSmart) Backend API
  version: 1.0.0
  description: OpenAPI 3.0 specification for the UniSmart Express.js router endpoints.
servers:
  - url: https://unismart-backend-one.vercel.app
    description: Production Server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Courses
    description: Course management, dropping, and registration
  - name: Student Info
    description: Student profile, dashboard, and grades endpoints

paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: Student login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example:
                message: "Login successful"
                student:
                  name: "Abanoub Amir"
                  gpa: 3.4
                  department: "Computer Science"
                token: "fake-jwt-token"
        '401':
          description: Invalid credentials
          content:
            application/json:
              example:
                success: false
                message: "Invalid university ID or password"
                errorCode: "INVALID_CREDENTIALS"

  /api/courses/available:
    post:
      tags:
        - Courses
      summary: Get available courses for student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: List of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '400':
          description: Unknown error occurred
          content:
            application/json:
              example:
                success: false
                message: "Error message details"
                errorCode: "UNKNOWN_ERROR"
        '404':
          description: Student not found
          content:
            application/json:
              example:
                success: false
                message: "Student not found"
                errorCode: "STUDENT_NOT_FOUND"

  /api/register-course:
    post:
      tags:
        - Courses
      summary: Register for courses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
                requested_courses:
                  type: array
                  items:
                    type: string
                  example: ["CS311", "CS313"]
      responses:
        '200':
          description: Successfully registered courses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["CS311", "CS313"]
        '400':
          description: Validation or array format error
          content:
            application/json:
              example:
                success: false
                message: "requested_courses must be an array"
        '404':
          description: Object not found
          content:
            application/json:
              example:
                success: false
                message: "Student not found"

  /api/unregister-course:
    delete:
      tags:
        - Courses
      summary: Drop a currently registered course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
                course_code:
                  type: string
                  example: "CS311"
      responses:
        '200':
          description: Course successfully unregistered
          content:
            application/json:
              example:
                success: true
                message: "Course unregistered successfully"
        '400':
          description: General execution error
          content:
            application/json:
              example:
                success: false
                message: "Details of the error"
        '404':
          description: Validation failed (missing student or course)
          content:
            application/json:
              example:
                success: false
                message: "Course is not in your current registration list"

  /api/dashboard:
    post:
      tags:
        - Student Info
      summary: Get student dashboard overview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Dashboard details
          content:
            application/json:
              example:
                gpa: 3.4
                available_hours: 21
                passed_hours: 30
                registered_courses_count: 2
                registered_courses_details:
                  - code: "CS311"
                    course_name: "Computer Security"
                    hours: 3
                    professor: "Dr. Tarek"
                    action: "Delete"
        '404':
          description: Student not found
          content:
            application/json:
              example:
                success: false
                message: "Student not found"

  /api/profile:
    post:
      tags:
        - Student Info
      summary: Get student profile data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: Profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
              example:
                name: "Abanoub Amir"
                email: "abanoubamir@university.edu"
                year_of_study: "Second Year"
                department: "Computer Science"
                student_id: "2026001"
                gpa: 3.4
        '404':
          description: Student not found
          content:
            application/json:
              example:
                success: false
                message: "Student not found"

  /api/grades:
    post:
      tags:
        - Student Info
      summary: Get academic history breakdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "2026001"
      responses:
        '200':
          description: List of graded courses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    course_name:
                      type: string
                    semester:
                      type: string
                    grade:
                      type: number
                    recognition:
                      type: string
              example:
                - course_name: "Fundamentals of CS"
                  semester: "First 2024"
                  grade: 90
                  recognition: "A"
                - course_name: "Structured Programming"
                  semester: "Second 2024"
                  grade: 85
                  recognition: "B+"
                - course_name: "Data Structures"
                  semester: "First 2025"
                  grade: 97
                  recognition: "A+"
        '404':
          description: Student not found
          content:
            application/json:
              example:
                success: false
                message: "Student not found"

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        university_id:
          type: string
          example: "2026001"
        password:
          type: string
          example: "123"
          
    Course:
      type: object
      properties:
        code:
          type: string
          example: "CS111"
        name:
          type: string
          example: "Fundamentals of CS"
        credits:
          type: integer
          example: 3
        level:
          type: integer
          example: 1
        prerequisites:
          type: array
          items:
            type: string
          example: []
        professor:
          type: string
          example: "Dr. Osama"

    Student:
      type: object
      properties:
        student_id:
          type: string
          example: "2026001"
        name:
          type: string
          example: "Abanoub Amir"
        email:
          type: string
          example: "abanoubamir@university.edu"
        gpa:
          type: number
          example: 3.4
        department:
          type: string
          example: "Computer Science"
        year_of_study:
          type: string
          example: "Second Year"
