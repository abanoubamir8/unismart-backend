paths:
  /api/login:
    post:
      summary: Unified System Login
      tags: [Auth]
      description: Endpoint authenticates both Students and Administrators. Returns a diverging schema based on the role detected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_id:
                  type: string
                  example: "admin01"
                password:
                  type: string
                  example: "admin@2026"
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    title: AdminResponse
                    properties:
                      success:
                        type: boolean
                        example: true
                      role:
                        type: string
                        example: "admin"
                      name:
                        type: string
                        example: "System Administrator"
                      token:
                        type: string
                        example: "fake-admin-jwt-token"
                  - type: object
                    title: StudentResponse
                    properties:
                      success:
                        type: boolean
                        example: true
                      role:
                        type: string
                        example: "student"
                      message:
                        type: string
                        example: "Login successful"
                      student_data:
                        type: object
                        properties:
                          name:
                            type: string
                            example: "Ahmed Freshman"
                          gpa:
                            type: number
                            example: 0.0
                          department:
                            type: string
                            example: "General"
                      token:
                        type: string
                        example: "fake-student-jwt-token"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Invalid university ID or password"
                  errorCode:
                    type: string
                    example: "INVALID_CREDENTIALS"
